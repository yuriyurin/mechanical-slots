<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Механический Слот</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --gold: #ffd700;
            --gold-dark: #b8860b;
            --wood: #3e2723;
            --wood-light: #5d4037;
            --red: #8b0000;
            --metal: #c0c0c0;
            --metal-dark: #808080;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            background: var(--tg-theme-bg-color, #111);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            width: 100vw;
            font-family: 'Courier New', monospace;
            color: var(--gold);
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        .machine {
            position: relative;
            width: 95vw;
            max-width: 400px;
            height: 95dvh;
            max-height: 750px;
            background: linear-gradient(135deg, var(--wood) 0%, var(--wood-light) 50%, var(--wood) 100%);
            border-radius: 16px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 
                inset 0 0 15px rgba(0,0,0,0.8),
                0 10px 30px rgba(0,0,0,0.7),
                0 0 0 3px var(--gold-dark),
                0 0 0 6px var(--wood);
        }

        .title {
            font-size: clamp(16px, 4vw, 22px);
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 10px;
            letter-spacing: 2px;
            color: var(--gold);
            text-transform: uppercase;
            text-align: center;
        }

        .reels-container {
            position: relative;
            width: 100%;
            height: 25vh; /* Адаптивная высота */
            max-height: 160px;
            min-height: 120px;
            background: #000;
            border-radius: 8px;
            border: 3px solid var(--metal);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.9);
            overflow: hidden;
            display: flex;
            justify-content: space-around;
            padding: 0 5px;
        }

        .reels-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 40%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
            z-index: 10;
        }

        .payline {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255, 0, 0, 0.8);
            transform: translateY(-50%);
            z-index: 5;
            box-shadow: 0 0 6px red;
        }
        .payline::before, .payline::after {
            content: '◀';
            position: absolute;
            top: -9px;
            color: red;
            font-size: 16px;
            text-shadow: 0 0 4px red;
        }
        .payline::before { left: -12px; }
        .payline::after { right: -12px; content: '▶'; }

        .reel {
            width: 33%;
            height: 100%;
            position: relative;
            overflow: hidden;
            background: linear-gradient(to right, #111 0%, #222 50%, #111 100%);
            border-left: 1px solid #333;
            border-right: 1px solid #333;
        }

        .reel-strip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            will-change: transform, filter;
        }

        .symbol {
            width: 100%;
            height: 50px; /* Фиксированная высота для расчётов */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        .blur-fast { filter: blur(3px); }
        .blur-medium { filter: blur(1.5px); }

        /* Рычаг */
        .lever-base {
            position: absolute;
            right: -25px;
            top: 25vh; /* Адаптивное позиционирование */
            max-top: 110px;
            width: 25px;
            height: 60px;
            background: linear-gradient(to right, var(--metal-dark), var(--metal));
            border-radius: 0 8px 8px 0;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        .lever-arm {
            position: absolute;
            bottom: 10px;
            left: 50%;
            width: 8px;
            height: 90px;
            background: linear-gradient(to right, #999, #fff, #999);
            transform-origin: bottom center;
            transform: rotate(0deg);
            border-radius: 4px;
            touch-action: none;
            transition: transform 0.1s linear;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }

        .lever-knob {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #ff4444, #8b0000);
            border-radius: 50%;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.5), 2px 2px 4px rgba(0,0,0,0.5);
        }

        .control-panel {
            margin-top: auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .display {
            background: #000;
            border: 2px solid var(--metal-dark);
            border-radius: 6px;
            padding: 8px;
            text-align: center;
            font-size: clamp(14px, 3.5vw, 18px);
            color: #0f0;
            text-shadow: 0 0 4px #0f0;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        .win-display {
            background: #000;
            border: 2px solid var(--gold);
            border-radius: 6px;
            padding: 8px;
            text-align: center;
            font-size: clamp(16px, 4vw, 22px);
            color: var(--gold);
            text-shadow: 0 0 8px var(--gold);
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            transform: scale(0.9);
        }

        .win-display.active {
            opacity: 1;
            transform: scale(1);
            animation: pulse-win 1s infinite alternate;
        }

        @keyframes pulse-win {
            from { box-shadow: 0 0 5px var(--gold); }
            to { box-shadow: 0 0 20px var(--gold), 0 0 30px red; }
        }

        .buttons {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 0 rgba(0,0,0,0.4), 0 4px 8px rgba(0,0,0,0.3);
            transition: all 0.1s;
            font-family: inherit;
            touch-action: manipulation;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 rgba(0,0,0,0.4), inset 0 2px 4px rgba(0,0,0,0.3);
        }
        .btn-bet { background: linear-gradient(to bottom, #4caf50, #2e7d32); color: white; }
        .btn-max { background: linear-gradient(to bottom, #ff9800, #e65100); color: white; }
        .btn:disabled {
            background: #444; color: #777; cursor: not-allowed;
            box-shadow: none; transform: translateY(4px);
        }

        .info {
            text-align: center;
            font-size: 11px;
            color: #aaa;
            margin-top: 8px;
            line-height: 1.3;
        }

        .tension-meter {
            width: 100%;
            height: 5px;
            background: #222;
            border-radius: 3px;
            margin-top: 5px;
            overflow: hidden;
            display: none;
        }
        .tension-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #4caf50, #ffeb3b, #f44336);
            transition: width 0.05s linear;
        }
    </style>
</head>
<body>

<div class="machine">
    <div class="title">МЕХАНИЧЕСКИЙ СЛОТ</div>
    
    <div class="reels-container" id="reelsContainer">
        <div class="payline"></div>
        <div class="reel"><div class="reel-strip" id="reel1"></div></div>
        <div class="reel"><div class="reel-strip" id="reel2"></div></div>
        <div class="reel"><div class="reel-strip" id="reel3"></div></div>
    </div>

    <div class="lever-base">
        <div class="lever-arm" id="lever">
            <div class="lever-knob"></div>
        </div>
    </div>

    <div class="control-panel">
        <div class="display" id="creditDisplay">БАЛАНС: 1000 🪙</div>
        <div class="display" id="betDisplay" style="font-size: 14px; color: #ff0;">СТАВКА: 100 🪙</div>
        
        <div class="win-display" id="winDisplay">ВЫИГРЫШ: 0 🪙</div>
        
        <div class="tension-meter" id="tensionMeter">
            <div class="tension-fill" id="tensionFill"></div>
        </div>

        <div class="buttons">
            <button class="btn btn-bet" id="btnBet" onclick="changeBet()">СТАВКА</button>
            <button class="btn btn-max" id="btnMax" onclick="maxBet()">МАКС</button>
        </div>
        
        <div class="info">
            🍋x1.5 | 🍇x2 | 🍒x3 | 🍊x4 | 🍉x6 | ⭐x10 | 🔔x15 | 💎x25<br>
            3 одинаковых = полный множитель<br>
            2 одинаковых = половина множителя<br>
            <span style="color: var(--gold);">Потяните красный шар вниз!</span>
        </div>
    </div>
</div>

<script>
    // --- TELEGRAM INIT ---
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    document.body.style.backgroundColor = tg.themeParams.bg_color || '#111';

    // --- КОНФИГУРАЦИЯ (Усложнённая) ---
    const SYMBOL_HEIGHT = 50;
    const SYMBOLS_PER_REEL = 40; // Увеличили длину ленты для большей случайности

    const SYMBOLS = [
        { icon: '🍋', mult: 1.5, weight: 35 },  // Очень частый
        { icon: '🍇', mult: 2.0, weight: 25 },  // Частый
        { icon: '🍒', mult: 3.0, weight: 15 },  // Средний
        { icon: '🍊', mult: 4.0, weight: 10 },  // Средний
        { icon: '🍉', mult: 6.0, weight: 7 },   // Редкий
        { icon: '⭐', mult: 10.0, weight: 5 },  // Очень редкий
        { icon: '🔔', mult: 15.0, weight: 2.5 }, // Эпический
        { icon: '💎', mult: 25.0, weight: 0.5 }  // Легендарный
    ];
    
    // --- СОСТОЯНИЕ ---
    let credits = 1000;
    let currentBet = 100;
    let isSpinning = false;
    let reels = [[], [], []];
    let reelPositions = [0, 0, 0];
    let reelSpeeds = [0, 0, 0];
    let animationId = null;
    let stopTimers = [0, 0, 0]; // Время, когда каждый барабан должен начать остановку
    let audioCtx = null;
    let lastHapticTime = 0;
    let startTime = 0;

    // --- АУДИО ---
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playClick() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.03);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.03);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.03);
    }

    function playClunk() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(120, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.12);
        gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.12);
    }

    function playWin() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.15, now + i * 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now + i * 0.1);
            osc.stop(now + i * 0.1 + 0.4);
        });
    }

    // --- ГЕНЕРАЦИЯ И РЕНДЕР ---
    function generateReelStrip() {
        let strip = [];
        for (let i = 0; i < SYMBOLS_PER_REEL; i++) {
            const rand = Math.random() * 100;
            let cumulative = 0;
            for (let sym of SYMBOLS) {
                cumulative += sym.weight;
                if (rand <= cumulative) { strip.push(sym); break; }
            }
        }
        return strip;
    }

    function renderReels() {
        for (let i = 0; i < 3; i++) {
            reels[i] = generateReelStrip();
            const el = document.getElementById(`reel${i+1}`);
            el.innerHTML = '';
            const combined = [...reels[i], ...reels[i], ...reels[i]];
            combined.forEach(sym => {
                const div = document.createElement('div');
                div.className = 'symbol';
                div.textContent = sym.icon;
                el.appendChild(div);
            });
            reelPositions[i] = -SYMBOL_HEIGHT * 1.5; 
            updateReelVisual(i);
        }
    }

    function updateReelVisual(reelIndex) {
        const el = document.getElementById(`reel${reelIndex+1}`);
        el.style.transform = `translateY(${reelPositions[reelIndex]}px)`;
        const speed = Math.abs(reelSpeeds[reelIndex]);
        el.classList.remove('blur-fast', 'blur-medium');
        if (speed > 25) el.classList.add('blur-fast');
        else if (speed > 8) el.classList.add('blur-medium');
    }

    // --- ФИЗИКА РЫЧАГА ---
    const lever = document.getElementById('lever');
    let isDragging = false;
    let startY = 0;
    let currentPull = 0;
    const MAX_PULL = 70;

    lever.addEventListener('mousedown', startPull);
    lever.addEventListener('touchstart', startPull, {passive: false});
    window.addEventListener('mousemove', updatePull);
    window.addEventListener('touchmove', updatePull, {passive: false});
    window.addEventListener('mouseup', endPull);
    window.addEventListener('touchend', endPull);

    function startPull(e) {
        if (isSpinning) return;
        isDragging = true;
        startY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
        initAudio();
        document.getElementById('tensionMeter').style.display = 'block';
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }

    function updatePull(e) {
        if (!isDragging) return;
        e.preventDefault();
        const y = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
        let diff = y - startY;
        if (diff < 0) diff = 0;
        if (diff > MAX_PULL) diff = MAX_PULL;
        
        currentPull = diff;
        const rotation = (currentPull / MAX_PULL) * 45;
        lever.style.transform = `rotate(${rotation}deg)`;
        
        const tensionPct = (currentPull / MAX_PULL) * 100;
        document.getElementById('tensionFill').style.width = `${tensionPct}%`;
    }

    function endPull() {
        if (!isDragging) return;
        isDragging = false;
        document.getElementById('tensionMeter').style.display = 'none';
        
        lever.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        lever.style.transform = 'rotate(0deg)';
        setTimeout(() => { lever.style.transition = 'transform 0.1s linear'; }, 300);

        if (currentPull > 15) {
            startSpin(currentPull);
        }
        currentPull = 0;
        document.getElementById('tensionFill').style.width = '0%';
    }

    // --- ЛОГИКА ВРАЩЕНИЯ И АВТО-ОСТАНОВКИ ---
    function startSpin(force) {
        if (credits < currentBet) {
            tg.showAlert("Недостаточно средств на балансе!");
            return;
        }
        
        credits -= currentBet;
        document.getElementById('winDisplay').classList.remove('active');
        updateDisplay();
        
        isSpinning = true;
        document.getElementById('btnBet').disabled = true;
        document.getElementById('btnMax').disabled = true;

        // Сила натяжения влияет на скорость
        const baseSpeed = 25 + (force * 0.4);
        for (let i = 0; i < 3; i++) {
            reelSpeeds[i] = baseSpeed + (Math.random() * 5);
        }
        
        // Автоматическое расписание остановки (водопад)
        // Барабан 1 останавливается через 2.0 сек, 2-й через 2.6 сек, 3-й через 3.2 сек
        const now = Date.now();
        stopTimers = [
            now + 2000 + Math.random() * 400,
            now + 2600 + Math.random() * 400,
            now + 3200 + Math.random() * 400
        ];
        
        lastHapticTime = 0;
        animate();
    }

    function animate() {
        if (!isSpinning) return;
        let allStopped = true;
        const now = Date.now();

        for (let i = 0; i < 3; i++) {
            // Проверка, пора ли останавливать этот барабан
            let shouldStop = now >= stopTimers[i];

            if (shouldStop || reelSpeeds[i] <= 0) {
                if (reelSpeeds[i] > 0.5) {
                    // Плавное замедление (трение)
                    reelSpeeds[i] *= 0.92;
                    
                    // Когда скорость очень мала, притягиваем к ближайшей сетке символов
                    if (reelSpeeds[i] < 3) {
                        const currentPos = reelPositions[i];
                        const targetPos = Math.round(currentPos / SYMBOL_HEIGHT) * SYMBOL_HEIGHT;
                        const diff = targetPos - currentPos;
                        
                        // Пружинный эффект для механической фиксации
                        reelPositions[i] += diff * 0.25;
                        
                        if (Math.abs(diff) < 0.8) {
                            reelPositions[i] = targetPos;
                            reelSpeeds[i] = 0;
                            playClunk();
                            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                            
                            // Нормализация для бесшовности
                            while (reelPositions[i] <= -SYMBOL_HEIGHT * SYMBOLS_PER_REEL) {
                                reelPositions[i] += SYMBOL_HEIGHT * SYMBOLS_PER_REEL;
                            }
                        }
                    }
                }
                if (reelSpeeds[i] > 0) allStopped = false;
            } else {
                allStopped = false;
                // Вращение
                reelPositions[i] -= reelSpeeds[i];
                
                // Звук и вибрация при прохождении символа
                const posMod = Math.abs(reelPositions[i]) % SYMBOL_HEIGHT;
                if (posMod < 4 && Date.now() - lastHapticTime > 50) {
                    playClick();
                    if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
                    lastHapticTime = Date.now();
                }

                // Бесшовная прокрутка
                if (reelPositions[i] <= -SYMBOL_HEIGHT * SYMBOLS_PER_REEL) {
                    reelPositions[i] += SYMBOL_HEIGHT * SYMBOLS_PER_REEL;
                }
            }
            updateReelVisual(i);
        }

        if (allStopped) {
            isSpinning = false;
            document.getElementById('btnBet').disabled = false;
            document.getElementById('btnMax').disabled = false;
            checkWin();
        } else {
            animationId = requestAnimationFrame(animate);
        }
    }

    // --- ПРОВЕРКА ВЫИГРЫША ---
    function checkWin() {
        const visibleSymbols = [];
        for (let i = 0; i < 3; i++) {
            let normPos = reelPositions[i] % (SYMBOL_HEIGHT * SYMBOLS_PER_REEL);
            if (normPos > 0) normPos -= (SYMBOL_HEIGHT * SYMBOLS_PER_REEL);
            let index = Math.round(Math.abs(normPos) / SYMBOL_HEIGHT) + 1;
            index = index % SYMBOLS_PER_REEL;
            visibleSymbols.push(reels[i][index]);
        }

        const counts = {};
        visibleSymbols.forEach(sym => { counts[sym.icon] = (counts[sym.icon] || 0) + 1; });

        let winAmount = 0;
        let winText = "";

        for (let icon in counts) {
            if (counts[icon] >= 2) {
                const symData = SYMBOLS.find(s => s.icon === icon);
                let mult = symData.mult;
                if (counts[icon] === 2) mult = mult / 2; // Пара = половина
                
                winAmount += Math.floor(currentBet * mult);
                winText = `${icon} x${counts[icon]} (x${mult})`;
            }
        }

        if (winAmount > 0) {
            credits += winAmount;
            playWin();
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            
            const winEl = document.getElementById('winDisplay');
            winEl.textContent = `ВЫИГРЫШ: +${winAmount} 🪙`;
            winEl.classList.add('active');
        } else {
            const winEl = document.getElementById('winDisplay');
            winEl.textContent = "Попробуйте ещё раз!";
            winEl.style.color = "#aaa";
            winEl.style.textShadow = "none";
            winEl.classList.add('active');
            setTimeout(() => {
                winEl.classList.remove('active');
                winEl.style.color = "var(--gold)";
                winEl.style.textShadow = "0 0 8px var(--gold)";
            }, 1500);
        }
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('creditDisplay').textContent = `БАЛАНС: ${credits} 🪙`;
        document.getElementById('betDisplay').textContent = `СТАВКА: ${currentBet} 🪙`;
    }

    function changeBet() {
        if (isSpinning) return;
        currentBet = currentBet === 100 ? 1000 : 100;
        updateDisplay();
    }

    function maxBet() {
        if (isSpinning) return;
        currentBet = 1000;
        updateDisplay();
    }

    renderReels();
    updateDisplay();
</script>
</body>
</html>
